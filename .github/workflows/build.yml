name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Keystore
      run: |
        keytool -genkey -v \
          -keystore keystore/release-key.jks \
          -keyalg RSA -keysize 2048 \
          -validity 10000 \
          -alias yemen-net \
          -storepass yemen123 \
          -keypass yemen123 \
          -dname "CN=YEMEN-NET, OU=Development, O=YEMEN-NET, L=Sana'a, ST=Sana'a, C=YE"
        mkdir -p keystore

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: |
        export KEYSTORE_PASSWORD=yemen123
        export KEY_ALIAS=yemen-net
        export KEY_PASSWORD=yemen123
        ./gradlew assembleRelease --stacktrace

    - name: Build Debug APK
      run: |
        export KEYSTORE_PASSWORD=yemen123
        export KEY_ALIAS=yemen-net
        export KEY_PASSWORD=yemen123
        ./gradlew assembleDebug --stacktrace

    - name: Verify APK exists
      run: |
        ls -la app/build/outputs/apk/release/
        ls -la app/build/outputs/apk/debug/

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: YEMEN-NET-Release-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: YEMEN-NET-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 90

    - name: Print Download Links
      run: |
        echo "============================================"
        echo "  BUILD COMPLETED SUCCESSFULLY!"
        echo "============================================"
        echo ""
        echo "Download your APKs from the Artifacts tab:"
        echo "  - YEMEN-NET-Release-APK (signed, recommended)"
        echo "  - YEMEN-NET-Debug-APK (for testing)"
        echo ""
        echo "APK Location after download:"
        echo "  Release: app/build/outputs/apk/release/YEMEN-NET-release.apk"
        echo "  Debug:   app/build/outputs/apk/debug/YEMEN-NET-debug.apk"
        echo "============================================"
